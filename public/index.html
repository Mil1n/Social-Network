<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Private Social Network</title><link rel="stylesheet" href="/styles.css"></head><body><main><section class="hero"><h1>Личная социальная сеть</h1><p>Чаты, группы, каналы, уведомления, жалобы и админ-панель в одном приватном MVP.</p></section><section id="auth" class="card"><h2>Вход / регистрация</h2><input id="username" placeholder="username"><input id="displayName" placeholder="Имя"><input id="password" type="password" placeholder="пароль от 8 символов"><button onclick="register()">Зарегистрироваться</button><button onclick="login()">Войти</button><p id="authMsg"></p></section><section id="app" class="grid hidden"><aside class="card"><h2 id="me"></h2><textarea id="bio" placeholder="О себе"></textarea><button onclick="saveProfile()">Сохранить профиль</button><h3>Поиск людей</h3><input id="search" oninput="findUsers()" placeholder="найти пользователя"><div id="users"></div><h3>Уведомления</h3><div id="notifications"></div></aside><section class="card"><h2>Чаты</h2><input id="chatTitle" placeholder="Название чата"><input id="chatMembers" placeholder="ID участников через запятую"><button onclick="createChat()">Создать чат</button><div id="chats"></div><div id="messages"></div><input id="messageText" placeholder="Сообщение"><input id="messageFile" placeholder="URL файла/изображения"><button onclick="sendMessage()">Отправить</button></section><section class="card"><h2>Каналы</h2><input id="channelTitle" placeholder="Название канала"><input id="channelDesc" placeholder="Описание"><button onclick="createChannel()">Создать канал</button><div id="channels"></div><textarea id="postText" placeholder="Текст поста"></textarea><input id="postFile" placeholder="URL вложения"><button onclick="createPost()">Опубликовать</button><div id="posts"></div></section><section class="card"><h2>Модерация</h2><select id="targetType"><option>message</option><option>post</option><option>user</option></select><input id="targetId" placeholder="ID объекта"><input id="reason" placeholder="Причина жалобы"><button onclick="report()">Пожаловаться</button><button onclick="loadAdmin()">Открыть админ-панель</button><pre id="admin"></pre></section></section></main><script src="/app.js"></script></body></html>
